substitutions:
  # Hostname-safe id (Wi-Fi hostname, topic prefix, etc.)
  device_name: atom-s3-bluetooth-proxy
  # Human-readable name in Home Assistant and entity-friendly labels
  friendly_name: Atom S3 Bluetooth Proxy
  # Append last 3 bytes of MAC to esphome.name (set true if you run several units)
  name_add_mac_suffix: "false"
  # Captive AP when Wi-Fi fails (must match your network policy)
  ap_ssid: Atom-S3-Bluetooth-Proxy
  # Wi-Fi RSSI color thresholds (dBm); stronger signal is less negative
  rssi_dbm_strong: "-60"
  rssi_dbm_moderate: "-70"

esphome:
  name: ${device_name}
  friendly_name: "${friendly_name}"
  min_version: 2025.8.0
  name_add_mac_suffix: ${name_add_mac_suffix}
  on_boot:
    priority: -100
    then:
      - output.turn_on: backlight_gpio

esp32:
  board: m5stack-atoms3
  framework:
    type: esp-idf

logger:
  level: INFO

api:
  encryption:
    # Generated by ESPHome; stored in secrets.yaml
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "${ap_ssid}"
    password: !secret ap_password

captive_portal:

# Required for the safe_mode button (see ESPHome safe_mode component docs).
safe_mode:
  id: device_safe_mode

button:
  - platform: safe_mode
    id: button_safe_mode
    name: Safe mode boot
    safe_mode: device_safe_mode
  - platform: factory_reset
    id: button_factory_reset
    name: Factory reset

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 16
  - file: "gfonts://Roboto"
    id: font_large
    size: 24

esp32_ble_tracker:
  scan_parameters:
    active: true

bluetooth_proxy:
  active: true

spi:
  clk_pin: GPIO17
  mosi_pin: GPIO21

display:
  - platform: st7789v
    id: display_tft
    model: CUSTOM
    width: 128
    height: 128
    offset_width: 1
    offset_height: 2

    # Optional display rotation (uncomment if mounting differently)
    # If changed, text alignment and offsets may need adjustment.
    # rotation: 180    

    cs_pin: GPIO15
    dc_pin: GPIO33
    reset_pin: GPIO34
    update_interval: never
    lambda: |-
      it.fill(Color(0, 0, 0));

      it.printf(64, 10, id(font_large),
                Color(255, 255, 255),
                TextAlign::TOP_CENTER,
                "BT Proxy");

      it.printf(64, 45, id(font_small),
                id(esphome_status).state ? Color(0, 255, 0) : Color(255, 0, 0),
                TextAlign::TOP_CENTER,
                "ESPHome: %s",
                id(esphome_status).state ? "ONLINE" : "OFFLINE");

      float rssi = id(wifi_rssi).state;
      Color signal_color =
          (rssi > ${rssi_dbm_strong}) ? Color(0, 255, 0) :
          (rssi > ${rssi_dbm_moderate}) ? Color(255, 165, 0) :
                                        Color(255, 0, 0);

      it.printf(64, 80, id(font_small),
                signal_color,
                TextAlign::TOP_CENTER,
                "Signal: %.0f dBm", rssi);

sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi RSSI"
    id: wifi_rssi
    update_interval: 60s
    on_value:
      then:
        - component.update: display_tft

binary_sensor:
  # Tracks whether ESPHome is connected to Home Assistant
  - platform: status
    id: esphome_status
    on_state:
      then:
        - component.update: display_tft

  # Physical user button (GPIO41 on standard Atom S3 with this LCD stack; M5 pin map).
  - platform: gpio
    id: atom_button
    internal: true
    pin:
      number: GPIO41
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_multi_click:
      - timing:
          - ON for at least 8s
        then:
          - button.press: button_factory_reset
      - timing:
          - ON for at most 1s
          - OFF for at least 50ms
          - ON for at most 1s
          - OFF for at least 0.2s
        then:
          - button.press: button_safe_mode

output:
  - platform: gpio
    pin: GPIO16
    id: backlight_gpio
